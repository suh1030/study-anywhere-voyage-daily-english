<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAV Daily English — Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 480px; width: 100%; text-align: center; }
    .logo { font-size: 13px; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: 16px; }
    h1 { font-size: 32px; font-weight: 700; color: #ffffff; margin-bottom: 8px; }
    .sub { font-size: 15px; color: #666; margin-bottom: 48px; }
    .links { display: flex; flex-direction: column; gap: 16px; }
    a.card {
      display: block;
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 20px 24px;
      text-decoration: none;
      transition: border-color 0.2s;
    }
    a.card:hover { border-color: #7c6aff; }
    .card-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .card-desc { font-size: 13px; color: #666; }
    footer { margin-top: 48px; font-size: 12px; color: #333; }
  </style>
</head>
<body>
<div class="container">
  <p class="logo">SAV Daily English</p>
  <h1>Legal</h1>
  <p class="sub">Official legal documents for the SAV Daily English app.</p>
  <div class="links">
    <a class="card" href="privacy-policy.html">
      <div class="card-title">Privacy Policy</div>
      <div class="card-desc">How we collect, use, and protect your data</div>
    </a>
    <a class="card" href="terms-of-service.html">
      <div class="card-title">Terms of Service</div>
      <div class="card-desc">Rules and conditions for using the app</div>
    </a>
  </div>
  <footer>&copy; 2026 SAV Daily English</footer>
</div>
</body>
</html>
